<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#165a72">
    <title>CuraWay 文档翻译工具</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css?v=41">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-logo" src="assets/curaway-logo.png" alt="CuraWay">
          <div>
            <h1>文档翻译工具</h1>
            <p class="version">v41 · PDF版式回退修复</p>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="icon-button install-button" id="installButton" type="button" hidden title="安装到桌面" aria-label="安装到桌面">
            <svg class="install-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 3h8a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"></path>
              <path d="M12 7v7"></path>
              <path d="m9 11 3 3 3-3"></path>
              <path d="M10 18h4"></path>
            </svg>
          </button>
          <button class="icon-button" id="resetButton" type="button" title="清空当前文件" aria-label="清空当前文件">
            <span aria-hidden="true">↺</span>
          </button>
        </div>
      </header>

      <section class="workspace" aria-label="文档翻译工作区">
        <aside class="sidebar">
          <label class="upload-zone" for="fileInput">
            <input id="fileInput" type="file" multiple accept=".pptx,.ppt,.docx,.doc,.pdf,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,application/pdf">
            <span class="upload-icon" aria-hidden="true">+</span>
            <span class="upload-title">选择或拖入文档</span>
            <span class="upload-copy" id="fileMeta">支持 PPTX / DOCX / PDF；旧版 PPT/DOC 请先另存</span>
          </label>

          <div class="settings">
            <label>
              翻译方向
              <select id="translationDirection">
                <option value="zh-en" selected>中文 → 英文</option>
                <option value="en-zh">英文 → 中文</option>
                <option value="auto-en">自动识别 → 英文</option>
                <option value="auto-zh">自动识别 → 中文</option>
              </select>
            </label>
            <label>
              PPT 版式策略
              <select id="pptLayoutMode">
                <option value="smart" selected>保留原文本框换行</option>
                <option value="keep-size">强制单行（谨慎）</option>
                <option value="compact-fit">紧凑适配，轻微缩小</option>
              </select>
            </label>
            <label>
              译文字号比例
              <div class="range-row">
                <input id="fontScale" type="range" min="60" max="115" step="5" value="100">
                <output id="fontScaleValue">100%</output>
              </div>
            </label>
            <label>
              模型
              <input id="modelName" type="text" value="deepseek-v4-flash" spellcheck="false">
            </label>
            <label>
              DeepSeek API Key
              <input id="apiKey" type="password" placeholder="仅在当前页面使用，不写入文件">
            </label>
          </div>

          <div class="actions">
            <button id="batchTranslateButton" type="button" disabled>批量翻译并保存</button>
            <button id="translateButton" class="primary" type="button" disabled>自动翻译</button>
            <button id="previewButton" type="button" disabled>预览译文</button>
            <button id="downloadButton" type="button" disabled>导出翻译文件</button>
            <button id="shareButton" type="button" disabled>分享翻译文件</button>
          </div>

          <section class="saved-files" aria-label="已保存翻译文件">
            <div class="saved-files-head">
              <strong>已保存文件</strong>
              <span id="savedFileCount">0</span>
            </div>
            <div class="batch-queue" id="batchQueue" hidden></div>
            <div class="saved-file-list" id="savedFileList">
              <p class="saved-empty">生成后的文件会保存在这里，可再次下载或分享。</p>
            </div>
          </section>

          <div class="stats" aria-live="polite">
            <div>
              <strong id="slideCount">0</strong>
              <span>页面/部件</span>
            </div>
            <div>
              <strong id="segmentCount">0</strong>
              <span>段文字</span>
            </div>
            <div>
              <strong id="translatedCount">0</strong>
              <span>段译文</span>
            </div>
          </div>
        </aside>

        <section class="panel">
          <div class="panel-head">
            <div class="status-copy">
              <h2>文本清单</h2>
              <p id="statusText">请先选择一个 PPTX、DOCX 或 PDF 文件。</p>
            </div>
            <div class="status-visual" id="statusVisual" aria-hidden="true">
              <span class="status-ring"></span>
              <span class="status-dot"></span>
            </div>
            <div class="progress" aria-hidden="true">
              <span id="progressFill"></span>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>页码</th>
                  <th>原文</th>
                  <th>译文</th>
                </tr>
              </thead>
              <tbody id="segmentTable">
                <tr class="empty-row">
                  <td colspan="3">
                    <div class="empty-state">
                      <strong>还没有载入内容</strong>
                      <span>上传 PPTX、DOCX 或 PDF 后，可逐段翻译、校对并导出新文件。</span>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <dialog class="preview-dialog" id="previewDialog">
      <div class="preview-shell">
        <header class="preview-head">
          <div>
            <p class="eyebrow">Preview</p>
            <h2>译文预览</h2>
            <p id="previewMeta">按页面/部件预览最终写入文件的文字。</p>
          </div>
          <div class="preview-actions">
            <button id="previewDownloadButton" class="primary" type="button" disabled>导出文件</button>
            <button id="previewShareButton" type="button" disabled>分享文件</button>
            <button class="icon-button" id="previewCloseButton" type="button" title="关闭预览" aria-label="关闭预览">
              <span aria-hidden="true">×</span>
            </button>
          </div>
        </header>
        <div class="preview-body" id="previewBody"></div>
      </div>
    </dialog>

    <script src="vendor/jszip.min.js"></script>
    <script src="app.js?v=41" type="module"></script>
  </body>
</html>
